# devel-base コンテナ定義
# 要件書 3.1 / 3.4 / 3.5 / 6.2 節準拠
#
# ローカル起動:
#   cp .env.example .env  # 値を埋める
#   docker compose up -d
#   ブラウザで https://{gitlab,jenkins,redmine,sonarqube}.${DOMAIN_BASE} へ
name: devel-base

networks:
  default:
    name: devel-base

volumes:
  caddy-data:
  caddy-config:
  gitlab-config:
  gitlab-data:
  gitlab-logs:
  jenkins-home:
  gitlab-runner-config:
  redmine-files:
  redmine-plugins:
  redmine-config:
  sonarqube-data:
  sonarqube-extensions:
  postgres-data:

services:
  caddy:
    image: caddy:2.11.3
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_BASE: ${DOMAIN_BASE}
      LE_EMAIL: ${LE_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gitlab
      - jenkins
      - redmine
      - sonarqube

  gitlab:
    image: gitlab/gitlab-ce:19.0.1-ce.0
    restart: unless-stopped
    mem_limit: 5g
    shm_size: 256m
    hostname: gitlab.${DOMAIN_BASE}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.${DOMAIN_BASE}'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['proxy_set_headers'] = {
          'X-Forwarded-Proto' => 'https',
          'X-Forwarded-Ssl' => 'on'
        }
        gitlab_rails['gitlab_shell_ssh_port'] = 22
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-data:/var/opt/gitlab
      - gitlab-logs:/var/log/gitlab

  jenkins:
    image: jenkins/jenkins:2.555.2-lts
    restart: unless-stopped
    mem_limit: 3g
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.footerURL=https://jenkins.${DOMAIN_BASE}
    volumes:
      - jenkins-home:/var/jenkins_home

  # GitLab CI 用 Runner。Docker executor で host の Docker socket を共有し、
  # CI ジョブは別コンテナとして実行する。登録は初回のみ手動:
  #   docker compose exec gitlab-runner gitlab-runner register \
  #     --url https://gitlab.${DOMAIN_BASE} --registration-token <TOKEN>
  gitlab-runner:
    image: gitlab/gitlab-runner:v19.0.0
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - gitlab-runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - gitlab

  redmine:
    build:
      context: ./redmine
      args:
        REDMINE_VERSION: 6.1.2
    image: devel-base/redmine:6.1.2
    restart: unless-stopped
    mem_limit: 1g
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_PORT: 5432
      REDMINE_DB_DATABASE: ${REDMINE_DB_NAME}
      REDMINE_DB_USERNAME: ${REDMINE_DB_USER}
      REDMINE_DB_PASSWORD: ${REDMINE_DB_PASSWORD}
      REDMINE_SECRET_KEY_BASE: ${REDMINE_SECRET_KEY_BASE}
    volumes:
      - redmine-files:/usr/src/redmine/files
      - redmine-plugins:/usr/src/redmine/plugins
      - redmine-config:/usr/src/redmine/config
    depends_on:
      postgres:
        condition: service_healthy

  sonarqube:
    image: sonarqube:26.5.0.122743-community
    restart: unless-stopped
    mem_limit: 3g
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/${SONARQUBE_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      SONAR_WEB_HOST: 0.0.0.0
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      postgres:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # 共有 PostgreSQL。Redmine と SonarQube が同一インスタンス上の
  # 別 DB（redmine / sonarqube）に接続する。
  # 初期化スクリプト postgres/init.sh が両者のユーザと DB を作成する。
  postgres:
    image: postgres:18
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      REDMINE_DB_NAME: ${REDMINE_DB_NAME}
      REDMINE_DB_USER: ${REDMINE_DB_USER}
      REDMINE_DB_PASSWORD: ${REDMINE_DB_PASSWORD}
      SONARQUBE_DB_NAME: ${SONARQUBE_DB_NAME}
      SONARQUBE_DB_USER: ${SONARQUBE_DB_USER}
      SONARQUBE_DB_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/10-create-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
